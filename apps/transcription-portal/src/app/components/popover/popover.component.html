<svg [attr.height]="height" [attr.width]="width">
  <!-- white background -->
  <rect
    [attr.height]="height - margin.top - margin.bottom"
    [attr.width]="width - margin.left - margin.right"
    [attr.x]="margin.left"
    [attr.y]="margin.top"
    [style.fill]="'white'"
    filter="url(#f3)"
    rx="5"
    ry="5"
  ></rect>
  <!-- shadow -->
  <defs>
    <filter id="f3">
      <feDropShadow dx="0" dy="0" flood-color="gray" stdDeviation="5" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect
    [attr.height]="40"
    [attr.width]="width - margin.left - margin.right"
    [attr.x]="margin.left"
    [attr.y]="margin.top"
    [style.fill]="primaryColor"
    [style.stroke-width]="0"
  ></rect>
</svg>

<div class="inner" #inner>
  <div class="title">
    <ng-template [ngTemplateOutlet]="title"></ng-template>
  </div>
  <div class="content">
    <ng-template [ngTemplateOutlet]="content"></ng-template>
  </div>
</div>
<svg [attr.height]="height" [attr.width]="width">
  <!-- border color -->
  <rect
    [attr.height]="height - margin.top - margin.bottom"
    [attr.width]="width - margin.left - margin.right"
    [attr.x]="margin.left"
    [attr.y]="margin.top"
    [style.stroke]="primaryColor"
    [style.fill]="'transparent'"
    [style.stroke-width]="3"
    rx="5"
    ry="5"
  ></rect>
</svg>
<svg [attr.height]="height" [attr.width]="width">
  <!-- triangle pointer-->
  <polygon
    [attr.points]="getPolygonString()"
    [ngStyle]="{
      fill: pointer !== 'bottom-left' && pointer !== 'bottom-right' ? primaryColor : 'white',
    }"
  />
  <!-- triangle top border -->
  <line
    [attr.x1]="polygon.koord1.x"
    [attr.x2]="polygon.koord2.x"
    [attr.y1]="polygon.koord1.y"
    [attr.y2]="polygon.koord2.y"
    [style.stroke]="primaryColor"
    style="stroke-width: 3"
  />
  <!-- triangle bottom border -->
  <line
    [attr.x1]="polygon.koord1.x"
    [attr.x2]="polygon.koord3.x"
    [attr.y1]="polygon.koord1.y"
    [attr.y2]="polygon.koord3.y"
    [style.stroke]="primaryColor"
    style="stroke-width: 3"
  />
</svg>
