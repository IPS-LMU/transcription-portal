<div class="modal-header">
  <h4 class="modal-title pull-left">{{ 'modals.retrieving data.title' | transloco }}</h4>
  @if (error) {
    <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="activeModal.close()">
      <span aria-hidden="true" class="visually-hidden">&times;</span>
    </button>
  }
</div>
<div class="modal-body text-center">
  <p>{{ 'modals.retrieving data.description' | transloco }}</p>

  <i class="bi bi-cloud-download fs-1 my-3" style="color: cornflowerblue"></i>

  @if (!error) {
    <div>ETA: {{ minutes }}:{{ seconds }}</div>
  } @else {
    <p class="text-danger">{{ error }}</p>
  }
</div>
